[variables]
DOCUMENT_ROOT = "/app/public"

[start]
cmd = "cd /app && php artisan migrate --force || true && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && sed -i 's|root [^;]*;|root /app/public;|g' /nginx.conf && cp /nginx.conf /app/public/_nginxdebug.txt && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
