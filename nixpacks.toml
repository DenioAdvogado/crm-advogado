[variables]
NIXPACKS_PHP_ROOT_DIR = "/app/public"

[start]
cmd = "cd /app && php artisan migrate --force || true && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && cp /nginx.conf /nginx.conf.bak && sed -i '/root \/app\/public;/a location / { try_files $uri $uri/ /index.php?$query_string; }' /nginx.conf && (nginx -t -c /nginx.conf || cp /nginx.conf.bak /nginx.conf) && cp /nginx.conf /app/public/_nginxdebug.txt && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
